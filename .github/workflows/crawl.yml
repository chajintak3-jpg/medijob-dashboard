name: 메디잡 개원공고 수집

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:         # 수동 실행 버튼도 활성화

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 데이터 수집 실행
        run: python scraper/crawl.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/master.json
          git diff --staged --quiet || git commit -m "📊 데이터 자동 갱신 $(date +'%Y-%m-%d')"
          git push
