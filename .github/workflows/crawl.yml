name: 메디잡 개원공고 수집

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오전 8시 KST
  workflow_dispatch:         # 수동 실행

jobs:
  trigger-crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Render 크롤러 호출
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ vars.RENDER_CRAWL_URL }}?key=${{ vars.CRAWL_SECRET_KEY }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "크롤링 실패: $HTTP_CODE"
            exit 1
          fi
          echo "완료: $BODY"
