<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>개원병원 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1558b0;--blue-lt:#e8f0fb;--blue-md:#3d7de8;
  --gray0:#f4f6fa;--gray1:#e8ecf2;--gray2:#c8d0dc;--gray3:#8899aa;--gray4:#4a5568;
  --white:#fff;--black:#1a2233;
}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;font-size:13px;background:var(--gray0);color:var(--black)}
.header{background:linear-gradient(120deg,#0d3e8a 0%,#1a6fc4 60%,#2196f3 100%);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 16px rgba(13,62,138,.25)}
.header-title{font-size:17px;font-weight:700}
.total-badge{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700}
.nav{background:var(--white);border-bottom:2px solid var(--blue);padding:0 24px;display:flex;gap:2px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow-x:auto}
.nav-tab{padding:10px 16px 8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray3);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s}
.nav-tab:hover{color:var(--blue);background:var(--blue-lt)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--blue-lt)}
.nav-badge{background:var(--gray2);color:var(--gray4);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.nav-tab.active .nav-badge{background:var(--blue);color:#fff}
.toolbar{max-width:1400px;margin:14px auto 0;padding:0 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--gray2);border-radius:8px;padding:6px 12px}
.filter-label{font-size:12px;font-weight:600;color:var(--gray3)}
select.filter-sel{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--black);background:transparent;cursor:pointer;min-width:110px}
.search-wrap{position:relative}
.search-input{border:1.5px solid var(--gray2);border-radius:7px;padding:7px 12px 7px 30px;font-size:13px;width:200px;font-family:inherit;outline:none;background:var(--white)}
.search-input:focus{border-color:var(--blue-md)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--gray3);font-size:14px}
.info-right{margin-left:auto;font-size:11px;color:var(--gray3)}
.info-right span{font-weight:600;color:var(--blue)}
.content{max-width:1400px;margin:14px auto 40px;padding:0 20px}
.sector{display:none}.sector.active{display:block}
.sector-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sector-label{font-size:14px;font-weight:700;color:var(--blue)}
.sector-cnt{background:#e53935;color:#fff;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(21,88,176,.08)}
thead tr{background:linear-gradient(90deg,#1558b0,#2196f3);color:#fff}
th{padding:11px 10px;font-size:12px;font-weight:600;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray1);transition:background .12s}
tbody tr:hover{background:var(--blue-lt)}
td{padding:9px 10px;vertical-align:top;font-size:13px}
.hospital-link{color:var(--blue);font-weight:600;text-decoration:none}
.hospital-link:hover{text-decoration:underline}
.branch-tag{display:inline-block;white-space:nowrap;white-space:nowrap;background:var(--blue-lt);color:var(--blue);border-radius:5px;padding:2px 8px;font-size:12px;font-weight:600}
.type-tag{display:inline-block;white-space:nowrap;background:#f0fff4;color:#1a7c42;border-radius:5px;padding:2px 8px;font-size:12px;font-weight:600}
.date-cell{color:var(--gray3);font-size:12px;white-space:nowrap}
.empty-msg{text-align:center;padding:50px;color:var(--gray3)}
.loading-wrap{text-align:center;padding:60px;color:var(--gray3)}

@media(max-width:640px){table,thead,tbody,th,td,tr{display:block}thead{display:none}.tbl-wrap{overflow:visible}table{min-width:unset;box-shadow:none;background:transparent;border-radius:0}tbody tr{background:var(--white);border-radius:10px;margin-bottom:10px;padding:14px;box-shadow:0 2px 8px rgba(21,88,176,.08);border:none}tbody tr:hover{background:var(--white)}td{padding:3px 0;border:none;font-size:13px;display:flex;align-items:flex-start;gap:6px}td::before{content:attr(data-label);font-size:11px;color:var(--gray3);font-weight:600;min-width:60px;flex-shrink:0;padding-top:2px}td:first-child{display:none}td.td-hospital{font-size:14px;font-weight:700;margin-bottom:6px;display:block}td.td-hospital::before{display:none}td.td-date{margin-top:4px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">🏥 개원병원 현황</div>
  <div class="total-badge" id="totalBadge">로딩중...</div>
</div>
<nav class="nav" id="navBar"></nav>
<div class="toolbar">
  <div class="filter-group">
    <span class="filter-label">🏢 지점</span>
    <select class="filter-sel" id="branchFilter" onchange="applyFilters()">
      <option value="">전체 지점</option>
      <option>강남지점</option><option>강동지점</option><option>강릉지점</option>
      <option>광주1지점</option><option>광주2출장소</option><option>김해 출장소</option>
      <option>남부1지점</option><option>남부2지점</option><option>남양주지점</option>
      <option>대구1지점</option><option>대구2지점</option><option>대구3지점</option>
      <option>대전1지점</option><option>대전2지점</option><option>동탄지점</option>
      <option>목포지점</option><option>부산1지점</option><option>부산2지점</option>
      <option>부산3지점</option><option>부산4출장소</option><option>북부지점</option>
      <option>서부지점</option><option>서산 출장소</option><option>서초지점</option>
      <option>성남지점</option><option>순천지점</option><option>수원지점</option>
      <option>안동지점</option><option>안산지점</option><option>안양지점</option>
      <option>원주출장소</option><option>의정부지점</option><option>인천1지점</option>
      <option>인천2지점</option><option>인천3지점</option><option>일산지점</option>
      <option>전주지점</option><option>제주지점</option><option>중부지점</option>
      <option>창원지점</option><option>천안지점</option><option>청주지점</option>
      <option>춘천 출장소</option><option>통영지점</option><option>포항지점</option>
      <option>용인지점</option><option>진주지점</option><option>울산지점</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">🏨 종별</span>
    <select class="filter-sel" id="typeFilter" onchange="applyFilters()">
      <option value="">전체 종별</option>
      <option>정형외과</option><option>내과</option><option>한의원</option>
      <option>통증의학과</option><option>피부과</option><option>성형외과</option>
      <option>산부인과</option><option>치과</option><option>신경외과</option>
      <option>요양병원</option><option>의원</option><option>병원</option><option>기타</option>
    </select>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="병원명 · 지역명 검색..." oninput="applyFilters()">
  </div>
  <div class="info-right">최종 갱신: <span id="updateTime">-</span></div>
</div>
<div class="content" id="mainContent">
  <div class="loading-wrap">데이터 로딩중...</div>
</div>

<script>
const TABS = ['전체','서울','경기','인천','부산·경남','대구·경북','대전·충청','광주·호남','기타'];
function getSido(r){
  if(!r)return'기타';
  if(r.startsWith('서울'))return'서울';
  if(r.startsWith('경기'))return'경기';
  if(r.startsWith('인천'))return'인천';
  if(r.startsWith('부산')||r.startsWith('경남')||r.startsWith('울산'))return'부산·경남';
  if(r.startsWith('대구')||r.startsWith('경북'))return'대구·경북';
  if(r.startsWith('대전')||r.startsWith('충북')||r.startsWith('충남')||r.startsWith('세종'))return'대전·충청';
  if(r.startsWith('광주')||r.startsWith('전북')||r.startsWith('전남'))return'광주·호남';
  return'기타';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let allData=[], currentTab='전체';

function makeTable(data){
  if(!data.length)return'<div class="empty-msg">해당 조건의 병원이 없습니다.</div>';
  let rows=data.map((d,i)=>`<tr>
    <td style="color:var(--gray3);width:32px">${i+1}</td>
    <td class="td-hospital"><a class="hospital-link" href="${esc(d.url)}" target="_blank">${esc(d.hospital)}</a></td>
    <td data-label="담당지점">${d.branch&&d.branch!=='-'?`<span class="branch-tag">${esc(d.branch)}</span>`:'<span style="color:var(--gray2)">-</span>'}</td>
    <td data-label="종별"><span class="type-tag">${esc(d.type||'기타')}</span></td>
    <td data-label="지역" style="color:var(--gray4)">${esc(d.region||'')}</td>
    <td data-label="공고제목">${esc(d.title||'')}</td>
    <td data-label="최근업데이트" class="date-cell td-date">${esc(d.update_date||d.last_seen||'')}</td>
  </tr>`).join('');
  return`<table>
    <thead><tr>
      <th style="width:32px">#</th>
      <th style="min-width:140px">병원명</th>
      <th style="width:110px">담당지점</th>
      <th style="width:85px">종별</th>
      <th style="width:120px">지역</th>
      <th>공고제목</th>
      <th style="width:100px">최근업데이트</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function applyFilters(){
  const branch=document.getElementById('branchFilter').value;
  const type=document.getElementById('typeFilter').value;
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=allData.filter(d=>{
    if(currentTab!=='전체'&&getSido(d.region)!==currentTab)return false;
    if(branch&&d.branch!==branch)return false;
    if(type&&d.type!==type)return false;
    if(q&&!(d.hospital||'').toLowerCase().includes(q)&&!(d.region||'').toLowerCase().includes(q)&&!(d.title||'').toLowerCase().includes(q))return false;
    return true;
  });
  const sec=document.getElementById('sec-'+currentTab);
  if(sec)sec.querySelector('.tbl-wrap').innerHTML=makeTable(filtered);
  const cnt=document.querySelector('.nav-tab.active .nav-badge');
  if(cnt)cnt.textContent=filtered.length;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.sector').forEach(s=>s.classList.toggle('active',s.id==='sec-'+tab));
  applyFilters();
}

function renderAll(hospitals){
  allData=Object.values(hospitals);
  // 15일 필터
  const cutoff=new Date(Date.now()+9*3600000);
  cutoff.setDate(cutoff.getDate()-14);
  const cutStr=cutoff.toISOString().slice(0,10);
  allData=allData.filter(d=>(d.update_date||d.last_seen||'')>=cutStr);

  // 탭별 카운트
  const counts={};
  TABS.forEach(t=>counts[t]=0);
  allData.forEach(d=>{
    counts['전체']++;
    const s=getSido(d.region);
    if(counts[s]!==undefined)counts[s]++;
    else counts['기타']++;
  });

  // 네비 생성
  const nav=document.getElementById('navBar');
  nav.innerHTML=TABS.map(t=>`<div class="nav-tab${t==='전체'?' active':''}" data-tab="${t}" onclick="switchTab('${t}')">
    ${t} <span class="nav-badge">${counts[t]||0}</span>
  </div>`).join('');

  // totalBadge
  document.getElementById('totalBadge').textContent=allData.length+'개 병원';

  // 섹탄 생성
  const content=document.getElementById('mainContent');
  content.innerHTML=TABS.map(t=>`<div class="sector${t==='전체'?' active':''}" id="sec-${t}">
    <div class="sector-head">
      <span class="sector-label">📋 ${t}</span>
      <span class="sector-cnt">${counts[t]||0}건</span>
    </div>
    <div class="tbl-wrap"></div>
  </div>`).join('');

  applyFilters();
}

// 데이터 로드
fetch('data/master.json?t='+Date.now())
  .then(r=>r.json())
  .then(m=>{
    document.getElementById('updateTime').textContent=m.last_updated||'-';
    renderAll(m.hospitals||{});
  })
  .catch(e=>{
    document.getElementById('mainContent').innerHTML=
      '<div class="empty-msg">⚠️ 데이터를 불러오지 못했습니다.<br>'+e.message+'</div>';
  });
</script>
</body>
</html>
