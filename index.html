<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>메디잡 개원병원 현황</title><style>body{font-family:"Malgun Gothic",sans-serif;background:#f4f6fa;margin:0;padding:20px}.hd{background:linear-gradient(120deg,#0d3e8a,#2196f3);color:#fff;padding:16px 24px;border-radius:8px;margin-bottom:16px}.hd h1{font-size:18px;font-weight:700}.hd p{font-size:12px;opacity:.8;margin-top:4px}.ld{text-align:center;padding:60px;color:#8899aa;font-size:14px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1)}th{background:#1558b0;color:#fff;padding:9px 10px;text-align:left;font-size:12px;white-space:nowrap}td{padding:8px 10px;border-bottom:1px solid #e8ecf2;font-size:13px}tr:hover{background:#e8f0fb}tr.cl{opacity:.5}.br{background:#e8f0fb;color:#1558b0;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}.j{background:#f0f4ff;color:#3d5afe;border-radius:4px;padding:1px 5px;font-size:11px;margin:1px 1px 0 0;display:inline-block}.ac{background:#e8f5e9;color:#2e7d32;border-radius:4px;padding:2px 6px;font-size:11px}.cl2{background:#e8ecf2;color:#8899aa;border-radius:4px;padding:2px 6px;font-size:11px}a{color:#1558b0;font-weight:700;text-decoration:none}a:hover{color:#d93025}</style></head><body><div class="hd"><h1>🏥 메디잡 개원병원 현황</h1><p>공고제목 "개원" 포함 · 병원별 중복 제거 · 매일 자동 갱신 · 갱신일: <span id="u">-</span></p></div><div id="r"><div class="ld">⏳ 로딩 중...</div></div><script>(async()=>{try{const m=await(await fetch("data/master.json?t="+Date.now())).json();const G={"종로구":"중부지점","중구":"중부지점","용산구":"중부지점","성동구":"중부지점","광진구":"중부지점","동대문구":"중부지점","중랑구":"북부지점","성북구":"북부지점","강북구":"북부지점","도봉구":"북부지점","노원구":"북부지점","은평구":"서부지점","서대문구":"서부지점","마포구":"서부지점","양천구":"남부1지점","구로구":"남부1지점","영등포구":"남부1지점","광명시":"남부1지점","금천구":"남부2지점","동작구":"남부2지점","관악구":"남부2지점","강서구":"일산지점","서초구":"서초지점","강남구":"강남지점","송파구":"강동지점","강동구":"강동지점","하남시":"강동지점","미추홀구":"인천1지점","연수구":"인천1지점","남동구":"인천1지점","부평구":"인천2지점","부천시":"인천2지점","계양구":"인천3지점","서구":"인천3지점","강화군":"인천3지점","김포시":"인천3지점","성남시":"성남지점","수원시":"수원지점","의정부시":"의정부지점","안양시":"안양지점","시흥시":"안양지점","군포시":"안양지점","의왕시":"안양지점","평택시":"동탄지점","오산시":"동탄지점","화성시":"동탄지점","안산시":"안산지점","고양시":"일산지점","파주시":"일산지점","구리시":"남양주지점","남양주시":"남양주지점","용인시":"용인지점","이천시":"용인지점"};const br=r=>{if(!r)return"-";for(const[k,v]of Object.entries(G))if(r.includes(k))return v;return"-";};const tp=h=>/요양병원/.test(h)?"요양병원":/한의원/.test(h)?"한의원":/의원/.test(h)?"의원":/병원/.test(h)?"병원":"기타";const e=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");document.getElementById("u").textContent=m.last_updated||"-";const D=Object.values(m.hospitals||{}).sort((a,b)=>a.status!==b.status?a.status==="active"?-1:1:(b.first_seen||"").localeCompare(a.first_seen||""));const rows=D.map((d,i)=>{const b=br(d.region),t=tp(d.hospital),s=d.status==="active";const tc=t==="의원"?"background:#fff3e0;color:#c96400":t==="병원"?"background:#e8f5e9;color:#2e7d32":t==="요양병원"?"background:#fce4ec;color:#c62828":t==="한의원"?"background:#e8eaf6;color:#3949ab":"background:#e8ecf2;color:#4a5568";return"<tr class=\""+(!s?"cl":"")+"\">"+"<td style=\"text-align:center;color:#8899aa\">"+(i+1)+"</td>"+"<td><a href=\""+e(d.url)+"\" target=\"_blank\">"+e(d.hospital)+"</a></td>"+"<td><span class=\"br\">"+e(b)+"</span></td>"+"<td><span style=\"border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600;"+tc+"\">"+"<"+"/span></td>".replace("</span>",e(t)+"</span>")+"<td style=\"font-size:12px;color:#4a5568\">"+e(d.region)+"</td>"+"<td style=\"font-size:12.5px\">"+e(d.title)+"</td>"+"<td>"+(d.jobs||[]).map(j=>"<span class=\"j\">"+e(j)+"</span>").join("")+"</td>"+"<td style=\"text-align:center\">"+(d.count||1)+"</td>"+"<td><span class=\""+(s?"ac":"cl2")+"\">"+(s?"채용중":"마감")+"</span></td>"+"<td style=\"font-size:11.5px;color:#4a5568\">"+e(d.first_seen||"")+"</td>"+"<td style=\"font-size:11.5px;color:#4a5568\">"+e(d.closed_date||"-")+"</td></tr>";}).join("");document.getElementById("r").innerHTML="<table><thead><tr><th>#</th><th>병원명</th><th>담당지점</th><th>종별</th><th>지역</th><th>공고제목</th><th>구인직종</th><th>건</th><th>상태</th><th>최초등록</th><th>마감일</th></tr></thead><tbody>"+rows+"</tbody></table>";}catch(e){document.getElementById("r").innerHTML="<div class=\"ld\">⚠️ "+e.message+"<br><br>Actions 탭에서 Run workflow를 실행해 주세요.</div>";}})();</script></body></html>
